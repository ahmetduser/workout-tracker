spring:
  application:
    name: workout-tracker
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
app:
  security:
    username: ${APP_SECURITY_USERNAME}
    password: ${APP_SECURITY_PASSWORD}
    role: ${APP_SECURITY_ROLE:WRITER}
  jobs:
    weekly-summary:
      cron: ${APP_JOBS_WEEKLY_SUMMARY_CRON:0 0 2 * * MON}
      zone: ${APP_JOBS_WEEKLY_SUMMARY_ZONE:UTC}
logging:
  level:
    root: INFO
    duser.workouttracker: INFO
management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:false}

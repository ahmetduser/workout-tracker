spring:
  application:
    name: workout-tracker
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  security:
    oauth2:
      client:
        provider:
          okta:
            issuer-uri: ${app.oauth2.issuer}
        registration:
          okta:
            client-id: ${app.oauth2.client-id}
            client-secret: ${app.oauth2.client-secret}
            scope:
              - openid
              - profile
              - email
app:
  jobs:
    weekly-summary:
      cron: ${APP_JOBS_WEEKLY_SUMMARY_CRON:0 0 2 * * MON}
      zone: ${APP_JOBS_WEEKLY_SUMMARY_ZONE:UTC}
  oauth2:
    issuer: ${OAUTH2_DOMAIN}
    client-id: ${OAUTH2_CLIENT_ID}
    client-secret: ${OAUTH2_CLIENT_SECRET}
logging:
  level:
    root: INFO
    duser.workouttracker: INFO
management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:false}

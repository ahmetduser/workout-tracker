databaseChangeLog:
  - changeSet:
      id: 007-create-weekly-workout-summary
      author: codex
      changes:
        - createTable:
            tableName: weekly_workout_summary
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_weekly_workout_summary
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: week_start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: week_end_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: total_sessions
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: total_sets
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: total_reps
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: total_weight_volume
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: generated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: weekly_workout_summary
            baseColumnNames: user_id
            constraintName: fk_weekly_workout_summary_user
            referencedTableName: users
            referencedColumnNames: id
        - addUniqueConstraint:
            tableName: weekly_workout_summary
            columnNames: user_id, week_start_date
            constraintName: uk_weekly_workout_summary_user_week
        - createIndex:
            tableName: weekly_workout_summary
            indexName: idx_weekly_workout_summary_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: weekly_workout_summary
            indexName: idx_weekly_workout_summary_week_start_date
            columns:
              - column:
                  name: week_start_date

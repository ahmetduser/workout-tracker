spring:
  datasource:
    url: jdbc:h2:mem:workout-tracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

spring:
  datasource:
    url: jdbc:h2:mem:workout-tracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  security:
    oauth2:
      client:
        provider:
          okta:
            authorization-uri: https://example.test/oauth2/authorize
            token-uri: https://example.test/oauth2/token
            jwk-set-uri: https://example.test/oauth2/keys
            user-info-uri: https://example.test/userinfo
            user-name-attribute: sub
        registration:
          okta:
            client-id: test-client-id
            client-secret: test-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
app:
  jobs:
    weekly-summary:
      cron: 0 0 2 * * MON
      zone: UTC
logging:
  level:
    root: INFO
management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
